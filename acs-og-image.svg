<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0D1117"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a2744;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1"/>
    </linearGradient>
    <!-- Blue accent line pattern -->
  </defs>
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#1A6FE8"/>
  <!-- Large icon mark left -->
  <g transform="translate(80, 160) scale(4)">
    <path d="M32 4 L58 56 H46 L41 44 H23 L18 56 H6 Z" fill="rgba(255,255,255,0.06)"/>
    <path d="M32 4 L58 56 H46 L41 44 H23 L18 56 H6 Z" fill="none" stroke="#1A6FE8" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="320" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="96" fill="#ffffff" letter-spacing="4" opacity="1">APEX COMBAT</text>
  <text x="80" y="430" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="96" fill="#1A6FE8" letter-spacing="4">SERIES</text>
  <!-- Tagline -->
  <text x="82" y="500" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif" font-size="28" fill="rgba(255,255,255,0.5)" letter-spacing="6">THE PEAK OF THE FIGHT GAME</text>
  <!-- Right side decorative element -->
  <rect x="900" y="80" width="2" height="470" fill="#1A6FE8" opacity="0.3"/>
  <text x="940" y="200" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" letter-spacing="4">ACS 24</text>
  <text x="940" y="240" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="48" fill="#ffffff" letter-spacing="2">WINNER</text>
  <text x="940" y="290" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="48" fill="#ffffff" letter-spacing="2">TAKES ALL</text>
  <text x="940" y="340" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="32" fill="#1A6FE8" letter-spacing="2">£10,000</text>
  <text x="940" y="390" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" letter-spacing="3">23 AUGUST 2026</text>
  <text x="940" y="420" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif" font-size="16" fill="rgba(255,255,255,0.35)" letter-spacing="2">INDIGO AT THE O2, LONDON</text>
  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="#1A6FE8"/>
</svg>
